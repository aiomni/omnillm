name: Package Bundles

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build distributable bundles
        run: |
          chmod +x ./scripts/package_release_bundles.sh
          ./scripts/package_release_bundles.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: omnillm-bundles-${{ github.run_id }}
          path: dist/*
          if-no-files-found: error

      - name: Attach bundles to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/SHA256SUMS.txt
          fail_on_unmatched_files: true
          generate_release_notes: true
