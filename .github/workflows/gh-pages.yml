name: Deploy Docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build site
        working-directory: website
        env:
          RSPRESS_BASE: /${{ github.event.repository.name }}/
        run: npm run site:build

      - name: Publish doc_build to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages || true

          publish_dir="$(mktemp -d)"

          if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
            git worktree add "$publish_dir" origin/gh-pages
            cd "$publish_dir"
            git checkout -B gh-pages
          else
            git worktree add --detach "$publish_dir"
            cd "$publish_dir"
            git checkout --orphan gh-pages
          fi

          find . -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +
          cp -R "$GITHUB_WORKSPACE"/website/doc_build/. .
          touch .nojekyll

          git add --all

          if git diff --cached --quiet; then
            echo "No documentation changes to publish."
            exit 0
          fi

          git commit -m "Deploy docs for ${GITHUB_SHA}"
          git push origin gh-pages
